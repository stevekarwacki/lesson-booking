server {
    listen 80;
    listen [::]:80;
    server_name _;

    # File upload size limit
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/lesson-booking-access.log;
    error_log /var/log/nginx/lesson-booking-error.log;

    # Proxy to Node.js application.
    # Maintenance mode is handled inside the Express app (middleware/maintenance.js)
    # so no Nginx-specific logic is needed here. This config works as-is whether
    # you're using Nginx, Caddy, or Cloudflare Tunnel as your reverse proxy.
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Real client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
